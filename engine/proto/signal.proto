syntax = "proto3";

package quant.proto;

option optimize_for = SPEED;

// ────────────────────────────────────────────────────────────
// Signal - Python 策略层向 C++ 引擎发送的目标权重信号
// ────────────────────────────────────────────────────────────
message Signal {
    string symbol          = 1;   // "000001.SZ"
    double target_weight   = 2;   // 目标权重（0~1）
    int64  signal_time_ns  = 3;   // 信号生成时间（纳秒）
    string strategy_id     = 4;   // 策略标识符
    double ref_price       = 5;   // 参考价格（策略计算时的价格）
    bool   close_position  = 6;   // true = 清仓该 symbol
}

// ────────────────────────────────────────────────────────────
// SignalBatch - 批量信号（一次重平衡）
// ────────────────────────────────────────────────────────────
message SignalBatch {
    repeated Signal signals     = 1;
    int64 batch_time_ns         = 2;   // 批次时间
    string strategy_id          = 3;
    double total_capital        = 4;   // 策略使用的总资金
    string rebalance_reason     = 5;   // 可选：触发原因（如 "daily_rebalance"）
}

// ────────────────────────────────────────────────────────────
// OrderCommand - C++ 引擎 → Python QMT 适配器
// 经过风控检查后的订单指令
// ────────────────────────────────────────────────────────────
message OrderCommand {
    int64  order_id         = 1;
    string symbol           = 2;   // "000001.SZ"
    string side             = 3;   // "BUY" / "SELL"
    string order_type       = 4;   // "MARKET" / "LIMIT"
    int64  quantity         = 5;   // 目标数量（股）
    double price            = 6;   // 限价（市价单为 0）
    string strategy_id      = 7;
    int64  created_ns       = 8;
    string algo             = 9;   // "direct" / "twap" / "vwap"
    int32  twap_slices      = 10;  // TWAP 分几笔
    int32  twap_interval_sec = 11; // TWAP 间隔秒
}

// ────────────────────────────────────────────────────────────
// OrderCommandBatch - 一次重平衡产生的批量订单指令
// ────────────────────────────────────────────────────────────
message OrderCommandBatch {
    repeated OrderCommand orders = 1;
    int64  batch_time_ns   = 2;
    string strategy_id     = 3;
}

// ────────────────────────────────────────────────────────────
// FillReport - Python QMT 适配器 → C++ 引擎
// 券商成交回报
// ────────────────────────────────────────────────────────────
message FillReport {
    int64  order_id         = 1;
    int64  trade_id         = 2;
    string symbol           = 3;
    string side             = 4;   // "BUY" / "SELL"
    int64  fill_quantity    = 5;
    double fill_price       = 6;
    double commission       = 7;
    double stamp_duty       = 8;
    int64  fill_time_ns     = 9;
    string status           = 10;  // "FILLED" / "PARTIAL" / "CANCELLED" / "REJECTED"
    string reject_reason    = 11;
}

// ────────────────────────────────────────────────────────────
// EngineStatus - C++ 引擎回传给 Python 的状态
// ────────────────────────────────────────────────────────────
message EngineStatus {
    double nav              = 1;
    double cash             = 2;
    double daily_pnl        = 3;
    double max_drawdown     = 4;
    int64  timestamp_ns     = 5;
    string status           = 6;   // "running" / "breaker_on" / "error"
    string error_msg        = 7;
}
